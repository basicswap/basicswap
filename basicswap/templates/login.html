{% extends "auth_base.html" %}

{% block title_suffix %} - Login{% endblock %}

{% block heading %}Login Required{% endblock %}
{% block subtext %}Please enter the password to access BasicSwap.{% endblock %}

{% block form_attrs %} action="/login"{% endblock %}

{% block submit_button %}
<button
  type="submit"
  id="auth-btn"
  data-loading-text="Logging in..."
  class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-medium py-3 px-4 rounded-lg transition-colors focus:outline-none disabled:cursor-not-allowed"
>
  <span id="auth-text">Login</span>
  <svg id="auth-spinner" class="hidden animate-spin ml-2 h-5 w-5 text-white inline" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
  </svg>
</button>
{% endblock %}
